- type: entity
  parent: LockerBaseSecure
  id: LockerClawCommandOfficer
  suffix: Claw Command
  name: claw command officer locker
  components:
  - type: Appearance
  - type: Sprite
    sprite: _ClawCommand/Structures/Storage/closet.rsi
    noRot: true
    layers:
    - state: generic
      map: ["enum.StorageVisualLayers.Base"]
    - state: generic_door
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: paper
      visible: false
      sprite: Structures/Storage/closet_labels.rsi
      offset: "-0.065,0"
      map: ["enum.PaperLabelVisuals.Layer"]
  - type: AccessReader
    access: [ ["ClawCommand"] ]
  - type: EntityStorageVisuals
    stateBaseClosed: cco
    stateDoorOpen: cco_open
    stateDoorClosed: cco_door

- type: entity
  parent: LockerBaseSecure
  id: LockerClawCommandMaid
  suffix: Claw Command
  name: claw command maid locker
  components:
  - type: Appearance
  - type: Sprite
    sprite: _ClawCommand/Structures/Storage/closet.rsi
  - type: AccessReader
    access: [ ["ClawCommand"] ]
  - type: EntityStorageVisuals
    stateBaseClosed: cco
    stateDoorOpen: cco_open
    stateDoorClosed: cco_door
