# Normal

- type: entity
  parent: GasTankRoundBase
  id: CC14TankWaterVapor
  suffix: Claw Command
  name: water vapor tank
  description: A standard cylindrical gas tank for water vapor. It can hold 5 L of gas.
  components:
  - type: Sprite
    sprite: _ClawCommand/Objects/Tanks/purple.rsi
  - type: Item
    sprite: _ClawCommand/Objects/Tanks/purple.rsi
  - type: Clothing
    sprite: _ClawCommand/Objects/Tanks/purple.rsi

- type: entity
  id: CC14TankWaterVaporFilled
  parent: CC14TankWaterVapor
  suffix: Claw Command, Filled
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      # 31 minutes
      volume: 5
      moles:
        WaterVapor: 2.051379050
      temperature: 293.15

# Emergency
- type: entity
  parent: GasTankRoundBase
  id: CC14EmergencyTankWaterVapor
  suffix: Claw Command
  name: emergency water vapor tank
  description: An easily portable tank for emergencies. Contains very little water vapor, rated for Feroxi survival use only. It can hold 0.66 L of gas.
  components:
  - type: Sprite
    sprite: _ClawCommand/Objects/Tanks/emergency_purple.rsi
  - type: Item
    size: Small
    sprite: _ClawCommand/Objects/Tanks/emergency_purple.rsi
    storedSprite:
      state: storage
      sprite: _ClawCommand/Objects/Tanks/emergency_purple.rsi
  - type: GasTank
    air:
      volume: 0.66
      temperature: 293.15
  - type: Clothing
    sprite: _ClawCommand/Objects/Tanks/emergency_purple.rsi
    slots:
    - Pocket
    - Belt
    - suitStorage
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 5
  - type: PhysicalComposition
    materialComposition:
      Steel: 100

- type: entity
  id: CC14EmergencyTankWaterVaporFilled
  parent: CC14EmergencyTankWaterVapor
  suffix: Claw Command, Filled
  components:
  - type: GasTank
    outputPressure: 21.3
    air:
      # 4 minutes
      volume: 0.66
      moles:
        WaterVapor: 0.270782035
      temperature: 293.15

