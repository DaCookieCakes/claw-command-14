- type: entity
  parent: BoxCardboard
  id: CC14BoxSurvivalWaterVapor
  name: survival box
  description: It's a box with basic internals inside.
  suffix: Claw Command, Standard Water Vapor
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingMaskBreath
        - id: CC14EmergencyTankWaterVaporFilled
        - id: EmergencyMedipen
        - id: Flare
        - id: FoodSnackNutribrick
        - id: DrinkWaterBottleFull
  - type: Sprite
    layers:
    - state: internals
    - state: emergencytank

