- type: entity
  parent: BasePDA
  id: CC14ClawCommandOfficerPDA
  suffix: Claw Command
  name: claw command officer PDA
  description: The red C of Claw Command is engraved on the front.
  components:
  - type: Pda
    id: CC14ClawCommandIDCard
    penSlot:
      startingItem: PenCap
      priority: -1
      whitelist:
        tags:
        - Write
  - type: Sprite
    sprite: _ClawCommand/Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
  - type: Icon
    sprite: _ClawCommand/Objects/Devices/pda.rsi
    state: pda
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda
  - type: PdaBorderColor
    borderColor: "#c53c5c"

