- type: entity
  name: maid katana
  parent: [ BaseSword, BaseCommandContraband ]
  id: CC14WeaponMeleeKatana
  description: A katana made specifically for the Claw Command Maid. Has a toggle for stun between slicing.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/katana.rsi
  - type: MeleeWeapon
    damage:
      types:
        Slash: 15
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    heldPrefix: off
    storedSprite:
      state: storage
      sprite: Objects/Weapons/Melee/katana_storage_64x.rsi #Done in 64x64 because it looks way too puny in 32x32
    shape:
    - 0,0,0,3
  - type: Clothing
    sprite: Objects/Weapons/Melee/katana.rsi
    slots:
    - Back
    - Belt
  - type: DisarmMalus
    malus: 0.225
  - type: ItemToggle
    predictable: false
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
  - type: ItemTogglePrefix
    prefixOn: on
    prefixOff: off
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Slash: 0
  - type: UseDelay
  - type: StaminaDamageOnHit
    damage: 35
    sound: /Audio/Weapons/egloves.ogg
  - type: StaminaDamageOnCollide
    damage: 35
    sound: /Audio/Weapons/egloves.ogg
  - type: LandAtCursor # it deals stamina damage when thrown
  - type: Stunbaton
    energyPerUse: 0
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
