# Ears
- type: marking
  id: CC14KitsuneEars
  bodyPart: HeadTop
  groupWhitelist: [ CC14MarkingsKitsune ]
  coloring:
    default:
      type:
        !type:CategoryColoring
        category: Hair
      fallbackTypes:
      - !type:CategoryColoring
        category: FacialHair
      - !type:SkinColoring
  sprites:
  - sprite: _DeltaV/Mobs/Customization/Kitsunes/ears.rsi
    state: foxears

