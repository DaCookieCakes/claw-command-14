# Tails
- type: marking
  id: CC14CatTail
  bodyPart: Tail
  groupWhitelist: [ CC14MarkingsFelinid ]
  coloring:
    default:
      type:
        !type:CategoryColoring
          category: Hair
      fallbackTypes:
        - !type:CategoryColoring
          category: FacialHair
        - !type:SkinColoring
  sprites:
  - sprite: _ClawCommand/Mobs/Customization/cat_parts.rsi
    state: tail_cat

- type: marking
  id: CC14CatTailBell
  bodyPart: Tail
  groupWhitelist: [ CC14MarkingsFelinid ]
  requires: CC14CatTail # New to Claw Command!
  renderPriority: 2 # New to Claw Command!
  coloring:
    layers:
      tail_bell:
        type:
          !type:SimpleColoring
            color: "#ffbf00"
      tail_cat:
        type:
          !type:CategoryColoring
          category: Hair
          fallbackTypes:
          - !type:CategoryColoring
            category: FacialHair
          - !type:SkinColoring
  sprites:
  - sprite: _ClawCommand/Mobs/Customization/cat_parts.rsi
    state: tail_bell

