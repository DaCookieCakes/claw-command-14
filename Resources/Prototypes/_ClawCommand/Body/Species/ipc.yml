- type: entity
  parent: BaseSpeciesAppearance
  id: CC14AppearanceIPC
  suffix: Claw Command
  name: ipc appearance
  components:
  - type: Inventory
    speciesId: CC14SpeciesIPC
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: CC14OrganIPCTorso
      Head: CC14OrganIPCHead
      ArmLeft: CC14OrganIPCArmLeft
      ArmRight: CC14OrganIPCArmRight
      HandRight: CC14OrganIPCHandRight
      HandLeft: CC14OrganIPCHandLeft
      LegLeft: CC14OrganIPCLegLeft
      LegRight: CC14OrganIPCLegRight
      FootLeft: CC14OrganIPCFootLeft
      FootRight: CC14OrganIPCFootRight
  - type: HumanoidProfile
    species: CC14SpeciesIPC
  - type: NameIdentifier
    group: Silicon

- type: entity
  parent:
  - CC14AppearanceIPC
  - BaseSpeciesMob
  id: CC14MobIPC
  name: Urist McMachina
  suffix: Claw Command
  components:
  - type: Vocal
    sounds:
      Male: UnisexSilicon
      Female: UnisexSilicon
      Unsexed: UnisexSilicon
  - type: DamagedSiliconAccent
  - type: Speech
    speechVerb: Robotic
    speechSounds: Borg
    allowedEmotes:
    - Laugh
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: petting-success-generic
    interactFailureString: petting-failure-generic
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: NameIdentifier
    group: Silicon
  - type: PowerCellDraw
    drawRate: 0.6
    enabled: true
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
        locked: true
        lockedMessage: ipc-cell-slot-locked
        whitelist:
          components:
          - PowerCell
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
  - type: MultiRepairable
    entries:
    - qualityNeeded: Welding
      fuelCost: 1
      damage:
        groups:
          Brute: -15
    - qualityNeeded: CC14ToolGlass
      doAfterDelay: 10
      eyeHeal: -5
  - type: Damageable
    damageModifierSet: CC14ModifierSetIPC
    damageContainer: CC14DamageIPC
  - type: Ipc
  - type: ActivatableUI
    blockSpectators: true # otherwise they can play client-side music
    inHandsOnly: false
    singleUser: true
    requiresComplex: true
    verbOnly: true
    verbText: verb-instrument-openui
    key: enum.InstrumentUiKey.Key
  - type: UserInterface
    interfaces:
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: Instrument
    allowPercussion: false
    handheld: false
    program: 10 # Musicbox. Har har harhar har.
  - type: Blindable
